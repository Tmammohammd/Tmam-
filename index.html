<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التوظيف | تمام محمد</title>
    <!-- استيراد خط Tajawal من Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #059669; /* أخضر ملكي */
            --accent-red: #dc2626; /* أحمر فخم */
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-main: #111827;
            --text-muted: #4b5563;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* شعار تمام محمد */
        .logo-wrapper {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo-box {
            font-size: 3.5rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 4px 4px 15px rgba(0,0,0,0.6);
            background: linear-gradient(135deg, #10b981, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border: 5px solid #ffffff;
            padding: 15px 45px;
            border-radius: 60px;
            display: inline-block;
            background-color: rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .container {
            max-width: 950px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            padding: 60px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.4);
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            border-bottom: 3px solid #f3f4f6;
            padding-bottom: 30px;
        }

        header h2 {
            font-size: 2.5rem;
            color: var(--primary-green);
            margin-bottom: 15px;
            font-weight: 800;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 500;
        }

        fieldset {
            border: none;
            margin-bottom: 50px;
        }

        legend {
            font-size: 1.6rem;
            font-weight: 800;
            color: #ffffff;
            background: linear-gradient(90deg, var(--primary-green), #065f46);
            padding: 10px 35px;
            border-radius: 50px;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 6px 15px rgba(5, 150, 105, 0.4);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            margin-bottom: 12px;
            font-weight: 800;
            color: #1f2937;
            font-size: 1.05rem;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="date"],
        input[type="time"],
        input[type="url"],
        input[type="password"],
        select,
        textarea {
            width: 100%;
            padding: 18px 22px;
            border: 2px solid #f3f4f6;
            border-radius: 18px;
            font-size: 1.05rem;
            font-family: inherit;
            transition: all 0.4s;
            background: #f9fafb;
            color: #111827;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-green);
            background: #ffffff;
            box-shadow: 0 0 0 6px rgba(16, 185, 129, 0.15);
            outline: none;
        }

        .options-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .custom-option {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #ffffff;
            padding: 14px 24px;
            border: 2px solid #f3f4f6;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 700;
        }

        .custom-option:hover {
            border-color: var(--primary-green);
            background: #f0fdf4;
        }

        .salary-card {
            background: linear-gradient(135deg, #fff5f5, #fff);
            padding: 30px;
            border-radius: 25px;
            border: 2px dashed var(--accent-red);
            text-align: center;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-red);
            margin: 25px 0;
            cursor: pointer;
        }

        .salary-info {
            display: flex;
            justify-content: space-between;
            font-weight: 900;
            color: var(--accent-red);
            font-size: 1.2rem;
        }

        .btn-container {
            display: flex;
            gap: 25px;
            margin-top: 60px;
        }

        .btn {
            flex: 1;
            padding: 22px;
            border: none;
            border-radius: 22px;
            font-size: 1.4rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.4s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--accent-red), #991b1b);
            color: white;
            box-shadow: 0 12px 25px rgba(220, 38, 38, 0.4);
        }

        .btn-submit:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(220, 38, 38, 0.5);
        }

        .btn-reset {
            background: #f3f4f6;
            color: #4b5563;
        }

        footer {
            margin-top: 60px;
            color: #ffffff;
            text-align: center;
            font-weight: 600;
            font-size: 1.1rem;
            background: rgba(0,0,0,0.3);
            padding: 15px 40px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        footer span {
            color: #10b981;
            font-weight: 900;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .container { padding: 40px 25px; }
            .logo-box { font-size: 2.5rem; padding: 10px 30px; }
            .btn-container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="logo-wrapper">
        <div class="logo-box">تمام محمد</div>
    </div>

    <div class="container">
        <header>
            <h2>بوابة التوظيف الذهبية</h2>
            <p>سجل بياناتك الآن لتصل مباشرة إلى بريد تمام محمد</p>
        </header>

        <!-- طريقة الإرسال المباشرة mailto -->
        <form id="jobForm">
            
            <fieldset>
                <legend>👤 البيانات الشخصية</legend>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>الاسم الكامل:</label>
                        <input type="text" id="fullName" placeholder="أدخل اسمك الثلاثي" required>
                    </div>
                    <div class="form-group">
                        <label>البريد الإلكتروني:</label>
                        <input type="email" id="email" placeholder="example@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label>العمر:</label>
                        <input type="number" id="age" min="18" placeholder="18+">
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>💼 التفاصيل المهنية</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label>المنصب المطلوب:</label>
                        <select id="position">
                            <option value="مطور مواقع ويب">مطور مواقع ويب</option>
                            <option value="مصمم جرافيك">مصمم جرافيك</option>
                            <option value="محلل بيانات">محلل بيانات</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>تاريخ البدء المتاح:</label>
                        <input type="date" id="startDate">
                    </div>
                    <div class="form-group full-width">
                        <label>توقعات الراتب السنوي:</label>
                        <div class="salary-card">
                            <div class="salary-info">
                                <span>$30,000</span>
                                <span>$120,000</span>
                            </div>
                            <input type="range" id="salary" min="30000" max="120000" step="5000">
                            <p style="color: var(--accent-red); font-weight: 800; margin-top: 10px;">حدد الراتب الذي تطمح له</p>
                        </div>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>📝 رسالة إضافية</legend>
                <div class="form-group full-width">
                    <label>لماذا أنت الشخص المناسب؟ (رسالة تغطية):</label>
                    <textarea id="cover" rows="5" placeholder="اكتب نبذة عن خبراتك وأهدافك..."></textarea>
                </div>
            </fieldset>

            <div class="btn-container">
                <button type="button" onclick="sendEmail()" class="btn btn-submit">إرسال الطلب الآن 🚀</button>
                <button type="reset" class="btn btn-reset">مسح النموذج</button>
            </div>

        </form>
    </div>

    <footer>
        جميع الحقوق محفوظة © 2026 | تطوير وإشراف <span>تمام محمد</span>
    </footer>

    <script>
        function sendEmail() {
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const age = document.getElementById('age').value;
            const position = document.getElementById('position').value;
            const startDate = document.getElementById('startDate').value;
            const salary = document.getElementById('salary').value;
            const cover = document.getElementById('cover').value;

            if(!fullName || !email) {
                alert('يرجى تعبئة الاسم والبريد الإلكتروني على الأقل');
                return;
            }

            const subject = encodeURIComponent("طلب توظيف جديد من موقعك!");
            const body = encodeURIComponent(
                "بيانات المتقدم الجديدة:\n\n" +
                "الاسم: " + fullName + "\n" +
                "البريد: " + email + "\n" +
                "العمر: " + age + "\n" +
                "الوظيفة: " + position + "\n" +
                "تاريخ البدء: " + startDate + "\n" +
                "الراتب المتوقع: " + salary + "$\n" +
                "الرسالة: " + cover
            );

            // فتح تطبيق البريد الإلكتروني مباشرة مع تعبئة البيانات
            window.location.href = "mailto:Tamammohammd280@gmail.com?subject=" + subject + "&body=" + body;
        }
    </script>

</body>
</html>
